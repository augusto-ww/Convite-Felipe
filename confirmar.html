<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirmar Presença · 1º Aniversário do Felipe 👑</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Cinzel:wght@400;500&family=Dancing+Script:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --night: #050b18;
    --deep: #071224;
    --navy: #0a1a35;
    --indigo: #1a2d55;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gold-pale: #f5e4b0;
    --cream: #fdf8ee;
    --rose: #d4606a;
    --error: #e05555;
    --success: #4a9a6a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #061428;
    color: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  canvas#starfield {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  .nebula {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.05;
    pointer-events: none;
    z-index: 0;
  }
  .nebula-1 { width: 500px; height: 500px; background: #3a5fa0; top: -100px; right: -100px; }
  .nebula-2 { width: 400px; height: 400px; background: #8b3a6b; bottom: -50px; left: -100px; }

  /* ── LAYOUT ── */
  .page-wrap {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 3rem 1.5rem 5rem;
  }

  /* ── HEADER ── */
  .page-header {
    text-align: center;
    margin-bottom: 3rem;
    animation: fadeUp 1s 0.2s ease both;
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.35em;
    color: var(--gold);
    text-decoration: none;
    text-transform: uppercase;
    margin-bottom: 2rem;
    opacity: 0.7;
    transition: opacity 0.3s;
  }
  .back-link:hover { opacity: 1; }

  .page-ornament {
    font-size: 2rem;
    display: block;
    margin-bottom: 1rem;
  }

  .page-title {
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 300;
    line-height: 1.2;
    margin-bottom: 0.5rem;
  }

  .page-title em { font-style: italic; color: var(--gold-light); }

  .page-subtitle {
    font-size: 1rem;
    color: var(--gold-pale);
    font-weight: 300;
    font-style: italic;
    opacity: 0.8;
  }

  .divider {
    width: 80px;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    margin: 1.5rem auto;
  }

  /* ── CARD PRINCIPAL ── */
  .form-card {
    width: 100%;
    max-width: 680px;
    border: 1px solid rgba(201,168,76,0.2);
    background: rgba(5,11,24,0.7);
    backdrop-filter: blur(20px);
    padding: 3rem 2.5rem;
    position: relative;
    animation: fadeUp 1s 0.5s ease both;
  }

  .form-card::before, .form-card::after,
  .form-card .corner-br, .form-card .corner-tl-inner {
    content: '';
    position: absolute;
    width: 18px; height: 18px;
    border-color: var(--gold);
    border-style: solid;
    opacity: 0.5;
  }
  .form-card::before { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
  .form-card::after { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }

  /* ── PASSOS ── */
  .steps-indicator {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    margin-bottom: 2.5rem;
  }

  .step-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(201,168,76,0.2);
    border: 1px solid rgba(201,168,76,0.3);
    transition: all 0.4s;
  }
  .step-dot.active {
    background: var(--gold);
    box-shadow: 0 0 10px rgba(201,168,76,0.5);
  }
  .step-dot.done {
    background: rgba(201,168,76,0.5);
  }

  .step-line {
    width: 40px; height: 1px;
    background: rgba(201,168,76,0.2);
    transition: background 0.4s;
  }
  .step-line.done { background: rgba(201,168,76,0.5); }

  /* ── FORMULÁRIO ── */
  .form-step { display: none; }
  .form-step.active { display: block; animation: fadeUp 0.5s ease; }

  .step-title {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 0.4em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
    display: block;
  }

  .step-heading {
    font-size: 1.6rem;
    font-weight: 300;
    font-style: italic;
    margin-bottom: 0.5rem;
    color: var(--cream);
  }

  .step-desc {
    font-size: 0.95rem;
    color: var(--gold-pale);
    font-style: italic;
    opacity: 0.7;
    margin-bottom: 2rem;
    line-height: 1.6;
  }

  /* ── INPUTS ── */
  .field {
    margin-bottom: 1.5rem;
  }

    font-size:
