<style>
/* ── RAIZ & RESET ── */
:root{
  --gold:        #c9a84c;
  --gold-bright: #e8c060;
  --gold-glow:   #f7df90;
  --gold-pale:   #f5eacc;
  --cream:       #fdf8ef;
  --night:       #020c1e;
  --red:         #e04050;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:var(--night);
  color:var(--cream);
  font-family:'Cormorant Garamond',serif;
  overflow-x:hidden;
}

/* ── CANVAS ESTRELADO FIXO ── */
#sky{position:fixed;inset:0;z-index:0;pointer-events:none;}

/* ── CONTROLE DE MÚSICA ── */
.music-ctrl{
  position:fixed;
  bottom:2rem;right:2rem;
  z-index:999;
  width:56px;height:56px;
  border-radius:50%;
  border:1.5px solid rgba(201,168,76,.35);
  background:rgba(2,12,30,.85);
  backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  transition:all .3s;
  box-shadow:0 4px 24px rgba(0,0,0,.4);
  opacity:0;
  animation:fadeIn .8s 2s ease forwards;
}
.music-ctrl:hover{
  border-color:var(--gold);
  box-shadow:0 6px 30px rgba(201,168,76,.3);
  transform:scale(1.05);
}
.music-ctrl svg{
  width:20px;height:20px;
  fill:var(--gold);
  transition:fill .2s;
}
.music-ctrl.playing svg{
  animation:pulse-music 1.5s ease-in-out infinite;
}
@keyframes pulse-music{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.12);}
}

/* ── COMETAS ── */
.comet{
  position:fixed;z-index:1;pointer-events:none;
  width:1px;height:1px;border-radius:50%;
  background:rgba(255,255,255,.9);
}
.comet::after{
  content:'';position:absolute;
  top:50%;right:1px;transform:translateY(-50%);
  height:1px;width:var(--len,100px);
  background:linear-gradient(to left,rgba(255,255,255,.85),rgba(201,168,76,.3),transparent);
}

/* ── PARTÍCULAS DOURADAS ── */
.gpx{
  position:fixed;pointer-events:none;z-index:1;
  border-radius:50%;
  animation:gpx-rise linear infinite;opacity:0;
}
@keyframes gpx-rise{
  0%  {transform:translateY(100vh) rotate(0deg) scale(0);  opacity:0;}
  5%  {opacity:.7; transform:translateY(95vh)  rotate(20deg) scale(1);}
  90% {opacity:.2;}
  100%{transform:translateY(-5vh)  rotate(400deg) scale(.5);opacity:0;}
}

/* ── LAYOUT — CENAS ── */
.scene{
  position:relative;z-index:2;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  padding:6rem 1.5rem;
  overflow:hidden;
}

.scene-divider{
  position:relative;z-index:2;
  display:flex;align-items:center;justify-content:center;
  gap:1rem;padding:0 2rem;
}
.scene-divider::before,.scene-divider::after{
  content:'';flex:1;max-width:180px;height:1px;
  background:linear-gradient(to right,transparent,rgba(201,168,76,.35));
}
.scene-divider::after{
  background:linear-gradient(to left,transparent,rgba(201,168,76,.35));
}
.div-gem{
  width:6px;height:6px;
  background:var(--gold);
  transform:rotate(45deg);
  box-shadow:0 0 8px rgba(201,168,76,.6);
}

/* ── ANIMAÇÕES BASE ── */
@keyframes fadeUp   {from{opacity:0;transform:translateY(28px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeDown {from{opacity:0;transform:translateY(-20px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn   {from{opacity:0;}to{opacity:1;}}
@keyframes scalein  {from{opacity:0;transform:scale(.88);}to{opacity:1;transform:scale(1);}}
@keyframes glow-pulse{0%,100%{text-shadow:0 0 20px rgba(201,168,76,.3),0 0 60px rgba(201,168,76,.1);}
                      50%     {text-shadow:0 0 40px rgba(201,168,76,.6),0 0 100px rgba(201,168,76,.2),0 0 160px rgba(201,168,76,.08);}}
@keyframes line-draw{from{width:0;}to{width:100%;}}
@keyframes crown-drop{from{opacity:0;transform:translateY(-30px) scale(.9);}to{opacity:1;transform:translateY(0) scale(1);}}
@keyframes bounce-arrow{0%,100%{transform:rotate(45deg) translateY(0);}50%{transform:rotate(45deg) translateY(7px);}}
@keyframes shimmer{0% {background-position:200% center;} 100%{background-position:-200% center;}}
@keyframes prince-float{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(-16px);}}
@keyframes fox-wag{0%,100%{transform:rotate(0deg);}50%{transform:rotate(5deg);}}
@keyframes rose-sway{0%,100%{transform:rotate(0deg);}50%{transform:rotate(-4deg);}}

/* SCROLL REVEAL */
.rev{opacity:0;transform:translateY(36px);transition:opacity 1.1s cubic-bezier(.22,1,.36,1),transform 1.1s cubic-bezier(.22,1,.36,1);}
.rev.d1{transition-delay:.2s;}.rev.d2{transition-delay:.4s;}.rev.d3{transition-delay:.6s;}.rev.d4{transition-delay:.8s;}
.rev.in{opacity:1;transform:translateY(0);}
.rev-scale{opacity:0;transform:scale(.92);transition:opacity 1s ease,transform 1s ease;}
.rev-scale.in{opacity:1;transform:scale(1);}

/* ── CENA 1 ── */
#s1{min-height:100vh;justify-content:center;}
.s1-inner{text-align:center;max-width:760px;width:100%;}
.top-rule{ display:flex;align-items:center;justify-content:center;gap:.8rem; margin-bottom:2.8rem; opacity:0;animation:fadeIn 1.2s .3s ease forwards; }
.top-rule-line{ height:1px;width:80px; background:linear-gradient(to right,transparent,var(--gold)); }
